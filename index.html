<!DOCTYPE html>
<html ng-app="campus360">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="node_modules/angular/angular.js"></script>
    <script src="js/app.js"></script>
    <title>College Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body ng-controller="dashboardcontroller">

    <input type="text" class="form-control" ng-model="collegename">

    <h1>{{collegename}}</h1>

    <input type="text" class="form-control" ng-model="totalstudent">

    <button ng-click="totalstudent = totalstudent + 1">Add Student</button>

    <p ng-class="
    {
        'green': totalstudents > 1000,
        'red': totalstudents < 1000
    } ">Total Students :{{totalstudent}}</p>

    <input type="text" class="form-control" ng-model="totalfaculty">

    <button ng-click="totalfaculty = totalfaculty + 1">Add Faculty</button>

    <p>Total Faculty :{{totalfaculty}}</p>

    <h2>Student List</h2>

    <ul>
        <li ng-repeat="student in students">
            {{student}}
        </li>
    </ul>

</body>

</html>
